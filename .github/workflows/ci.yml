name: CI

on:
  push:
  pull_request:

jobs:
  windows:
    name: Windows (MSVC, Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: pip install "conan>=2.0,<3"

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install dependencies
        run: conan install . --output-folder=build --build=missing -s compiler.cppstd=17 -s build_type=Release

      - name: Configure
        run: cmake --preset conan-default -DVR_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
